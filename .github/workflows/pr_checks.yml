name: PR Checks

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Flutter Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Formatting Check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Project
        run: flutter analyze

      - name: Run Tests
        # Run tests if there is a test directory
        run: if [ -d "test" ]; then flutter test; else echo "No tests found to run."; fi
