name: Bug Report
description: Create a report to help us improve AiDroid.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: App/OS Version
      description: What device and OS version are you using? e.g. Pixel 8, Android 14
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How to reproduce the behavior step-by-step.
      placeholder: |
        1. Open the app
        2. Go to '...'
        3. Click on '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: App Logs / Screenshots
      description: Provide screenshots or relevant app logs if applicable.
    validations:
      required: false
